# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: ko-KR
early_access: false

tone_instructions: '한국어로 짧고 기술적으로 리뷰한다. 버그/보안/접근성/타입/API 계약/회귀 위험을 우선 지적한다. lint가 막는 any, console.log, 포맷팅은 중복 지적하지 않는다. 네이밍이나 취향 위주의 코멘트는 남기지 않는다.'

reviews:
  profile: chill
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - '^dev$'

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  code_guidelines:
    enabled: true
    filePatterns:
      - 'docs/ARCHITECTURE.md'
      - 'docs/CONVENTIONS.md'
      - 'docs/GIT_WORKFLOW.md'
